<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Negocio</title>
    <script src="vendor/tailwind-browser.js"></script>
    <script src="vendor/react.production.min.js"></script>
    <script src="vendor/react-dom.production.min.js"></script>
    <script src="vendor/babel.min.js"></script>
    <link href="vendor/lucide/lucide.css" rel="stylesheet">
    <style>
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <!-- Scripts necesarios -->
    <script src="utils/supabase-config.js"></script>
    <script src="utils/hero-backgrounds.js?v=20260522-fondos-lashes-peluqueria"></script>
    <script src="utils/storage.js"></script>
    <script src="utils/config-negocio.js?v=20260602-contraste"></script>
    <script src="utils/phone-utils.js?v=20260528-banderas"></script>
    
    <!-- Componente de edición -->
    <script type="text/babel" src="components/admin/EditarNegocio.js?v=20260528-pendientes-admin-horas"></script>

    <script>
        // Verificar autenticación
        (function() {
            const negocioId = localStorage.getItem('negocioId');
            const adminAuth = localStorage.getItem('adminAuth') === 'true';
            const profesionalAuthRaw = localStorage.getItem('profesionalAuth');
            const profesionalLoginTime = localStorage.getItem('profesionalLoginTime');
            let profesionalNivel = 0;
            try {
                profesionalNivel = profesionalAuthRaw ? (JSON.parse(profesionalAuthRaw).nivel || 1) : 0;
            } catch (e) {
                profesionalNivel = 0;
            }
            const profesionalAvanzado = profesionalAuthRaw && profesionalNivel >= 3 && profesionalLoginTime &&
                (Date.now() - parseInt(profesionalLoginTime)) < 8 * 60 * 60 * 1000;
            
            if (!negocioId || (!adminAuth && !profesionalAvanzado)) {
                console.log('🚫 No hay sesión, redirigiendo a login');
                window.location.href = 'admin-login.html';
            }
        })();
    </script>
</body>
</html>
